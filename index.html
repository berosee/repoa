<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>repoa - Simple Player</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    /* 전체 높이 고정 및 스크롤 방지 */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #121212; color: #fff; }
    body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; }

    /* [해결 2] 상단 영역 고정: flex-shrink: 0와 z-index 설정 */
    .fixed-header { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background: #121212; 
      z-index: 1000; 
      padding-bottom: 15px; 
      flex-shrink: 0; /* 헤더가 줄어들지 않도록 고정 */
      border-bottom: 1px solid #222;
    }

    .nav, .player-card { width: 92%; max-width: 360px; }

    /* 네비게이션 */
    .nav { display: flex; gap: 4px; margin: 10px 0; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px; }
    .nav button { flex: 1; border: none; background: none; color: rgba(255, 255, 255, 0.4); padding: 8px 0; border-radius: 25px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .nav button.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    /* [해결 1] 앨범 레이아웃: 기존 대비 2/3 사이즈로 조정 */
    .album-zone { 
      width: 100%; 
      aspect-ratio: 16 / 9; /* 가로가 긴 시원한 비율 유지 */
      margin: 10px 0; 
      overflow: hidden; 
      border-radius: 8px; 
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* 사진 픽셀에 상관없이 꽉 차게 고정 */
    #albumArt { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; /* 영역에 가득 채움 */
    }

    /* 곡 정보 및 타임코드 (축소) */
    .song-info { text-align: center; margin: 8px 0; }
    .title { font-size: 15px; font-weight: 600; color: var(--neon-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .status-row { display: flex; justify-content: center; margin-bottom: 5px; }
    .time-display { font-size: 11px; color: #888; }

    /* 재생 바 (슬림) */
    .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; cursor: pointer; margin-bottom: 15px; }
    .progress-fill { height: 100%; background: var(--neon-blue); width: 0%; border-radius: 2px; }

    /* 컨트롤 버튼 (축소 및 정렬) */
    .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
    .btn-play-box { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .ctrl-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }

    /* [해결 2] 리스트 영역 스크롤 설정 */
    .playlist-wrapper { 
      width: 100%; 
      flex-grow: 1; /* 남은 공간 모두 차지 */
      overflow-y: auto; /* 리스트만 스크롤됨 */
      background: #181818;
    }
    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table tr { border-bottom: 1px solid #222; cursor: pointer; }
    .playlist-table td { padding: 12px 20px; font-size: 13px; color: #ccc; }
    .playlist-table tr.active { background: rgba(0, 210, 255, 0.1); }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav" id="menu">
    <button onclick="loadCategory('old')" id="old">OLD</button>
    <button onclick="loadCategory('enka')" id="enka">ENKA</button>
    <button onclick="loadCategory('jazz')" id="jazz">JAZZ</button>
  </div>

  <div class="player-card">
    <div class="album-zone">
      <img id="albumArt" src="https://via.placeholder.com/300x180?text=Select+Music" alt="Album Cover">
    </div>

    <div class="song-info">
      <div class="title" id="labelTitle">곡을 선택해 주세요</div>
    </div>
    
    <div class="status-row">
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    
    <div class="progress-container" id="progArea" onclick="seek(event)">
      <div class="progress-fill" id="progFill"></div>
    </div>
    
    <audio id="player"></audio>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevSong()">⏮</button>
      <div class="btn-play-box" onclick="togglePlay()"><span id="btnIcon" style="color:var(--neon-blue);font-size:20px;">▶</span></div>
      <button class="ctrl-btn" onclick="nextSong()">⏭</button>
      <button class="ctrl-btn" style="font-size:12px;" onclick="randomSong()">랜덤</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <div id="playlist"></div>
</div>

<script>
// (기존 스크립트와 동일하게 사용하시되, 아래 seek 함수만 추가하여 재생바 클릭 이동을 지원합니다.)
const user = "berosee";
const repo = "repoa";
let songs = [];
let names = [];
let index = 0;

const player = document.getElementById("player");
const albumArt = document.getElementById("albumArt");

async function loadCategory(folder) {
    setActiveButton(folder);
    const coverUrl = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/cover.jpg`;
    albumArt.src = coverUrl;
    albumArt.onerror = () => { albumArt.src = "https://via.placeholder.com/300x180?text=No+Cover"; };

    const api = `https://api.github.com/repos/${user}/${repo}/contents/${folder}`;
    try {
        const res = await fetch(api);
        const data = await res.json();
        songs = []; names = [];
        let html = '<table class="playlist-table" id="listTable">';
        data.forEach(file => {
            const fileName = file.name.toLowerCase();
            if(fileName.endsWith(".mp3") || fileName.endsWith(".flac")) {
                const url = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/${file.name}`;
                songs.push(url);
                names.push(file.name);
                html += `<tr onclick="play(${songs.length-1})"><td>${file.name}</td></tr>`;
            }
        });
        html += '</table>';
        document.getElementById("playlist").innerHTML = html;
    } catch(e) { console.error("Load failed"); }
}

function setActiveButton(folderId) {
    document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
    document.getElementById(folderId).classList.add('active');
}

function play(i) {
    index = i;
    player.src = songs[index];
    player.play();
    document.getElementById("labelTitle").textContent = names[index];
    updateUI();
}

function togglePlay() {
    if (!player.src) { play(0); return; }
    player.paused ? player.play() : player.pause();
}

function updateUI() {
    const rows = document.querySelectorAll("#listTable tr");
    rows.forEach((row, k) => {
        row.classList.toggle("active", k === index);
        if (k === index) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
}

function nextSong() { index = (index + 1) % songs.length; play(index); }
function prevSong() { index = (index - 1 + songs.length) % songs.length; play(index); }
function randomSong() { index = Math.floor(Math.random() * songs.length); play(index); }

// 재생바 클릭 이동
function seek(e) {
    const rect = document.getElementById("progArea").getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    player.currentTime = pos * player.duration;
}

player.addEventListener("ended", nextSong);
player.addEventListener("play", () => { document.getElementById("btnIcon").textContent = "Ⅱ"; });
player.addEventListener("pause", () => { document.getElementById("btnIcon").textContent = "▶"; });
player.ontimeupdate = () => {
    if (player.duration) {
        const cur = player.currentTime;
        const dur = player.duration;
        document.getElementById("curTime").textContent = formatTime(cur);
        document.getElementById("durTime").textContent = formatTime(dur);
        document.getElementById("progFill").style.width = (cur / dur * 100) + "%";
    }
};

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

loadCategory('old');
</script>
</body>
</html>
