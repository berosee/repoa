<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Album Edition</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #121212; }
    body { font-family: 'Pretendard', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; }

    .fixed-header { width: 100%; display: flex; flex-direction: column; align-items: center; background: #121212; z-index: 100; padding-bottom: 5px; flex-shrink: 0; }
    .nav, .player-card, .playlist-wrapper { width: 92%; max-width: 360px; }

    /* 네비게이션 */
    .nav { display: flex; gap: 4px; margin: 10px 0; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px; }
    .nav button { flex: 1; border: none; background: none; color: rgba(255, 255, 255, 0.4); padding: 8px 0; border-radius: 25px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .nav button.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    /* 플레이어 카드 & 앨범 이미지 구역 */
    .player-card { background: #0f172a; border-radius: 20px; padding: 15px 18px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.2); }
    
    /* [새로 추가] 앨범 이미지 스타일 */
    .album-zone {
      width: 100px; height: 100px; margin: 0 auto 12px;
      border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      background: #1a1c20; /* 이미지 로딩 전 배경 */
    }
    #albumArt { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }

    .song-info .title { font-size: 15px; font-weight: bold; margin-bottom: 12px; height: 1.2em; overflow: hidden; }
    .status-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
    .time-display { font-size: 19px; font-family: 'Arial', sans-serif; }
    
    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 10px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-play-box { border: 1.5px solid #fff; border-radius: 10px; width: 48px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* 리스트 영역 */
    .playlist-wrapper { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px 15px 0 0; -webkit-overflow-scrolling: touch; margin-top: 5px; }
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { padding: 10px 18px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #888; cursor: pointer; }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; background: rgba(0, 210, 255, 0.1); }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav" id="menu">
    <button onclick="loadCategory('old')" id="old">OLD</button>
    <button onclick="loadCategory('enka')" id="enka">ENKA</button>
    <button onclick="loadCategory('jazz')" id="jazz">JAZZ</button>
  </div>

  <div class="player-card">
    <div class="album-zone">
      <img id="albumArt" src="https://via.placeholder.com/150?text=Music" alt="Album Cover">
    </div>

    <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
    
    <div class="status-row">
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    
    <div class="progress-container" id="progArea">
      <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
    </div>
    
    <audio id="player"></audio>

    <div class="controls">
      <button style="background:none;border:none;color:#4b5563;font-size:18px;cursor:pointer;" onclick="prevSong()">⏮</button>
      <div class="btn-play-box" onclick="togglePlay()"><span id="btnIcon" style="color:var(--neon-blue);font-size:22px;">▶</span></div>
      <button style="background:none;border:none;color:#4b5563;font-size:18px;cursor:pointer;" onclick="nextSong()">⏭</button>
      <button style="background:none;border:none;color:#4b5563;font-size:14px;cursor:pointer;" onclick="randomSong()">랜덤</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <div id="playlist"></div>
</div>

<script>
const user = "berosee";
const repo = "repo"; // 사용자님의 실제 저장소 이름으로 확인하세요.
let songs = [];
let names = [];
let index = 0;

const player = document.getElementById("player");
const albumArt = document.getElementById("albumArt");

// 카테고리 로드
async function loadCategory(folder) {
    setActiveButton(folder);

    // [핵심] 폴더별 커버 이미지 주소 업데이트
    const coverUrl = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/cover.jpg`;
    albumArt.src = coverUrl;
    // 이미지 로딩 실패 시 기본 이미지 처리
    albumArt.onerror = () => { albumArt.src = "https://via.placeholder.com/150?text=No+Cover"; };

    const api = `https://api.github.com/repos/${user}/${repo}/contents/${folder}`;
    try {
        const res = await fetch(api);
        const data = await res.json();
        
        songs = [];
        names = [];
        let html = '<table class="playlist-table" id="listTable">';

        data.forEach(file => {
            const fileName = file.name.toLowerCase();
            if(fileName.endsWith(".mp3") || fileName.endsWith(".flac")) {
                const url = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/${file.name}`;
                songs.push(url);
                names.push(file.name);
                html += `<tr onclick="play(${songs.length-1})"><td>${file.name}</td></tr>`;
            }
        });
        html += '</table>';
        document.getElementById("playlist").innerHTML = html;
    } catch(e) {
        console.error("데이터 로드 실패");
    }
}

function setActiveButton(folderId) {
    document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.getElementById(folderId);
    if(activeBtn) activeBtn.classList.add('active');
}

function play(i) {
    index = i;
    player.src = songs[index];
    player.play();
    document.getElementById("labelTitle").textContent = names[index];
    updateUI();
}

function togglePlay() {
    if (!player.src) { play(0); return; }
    player.paused ? player.play() : player.pause();
}

function updateUI() {
    const rows = document.querySelectorAll("#listTable tr");
    rows.forEach((row, k) => {
        row.classList.toggle("active", k === index);
        if (k === index) {
            setTimeout(() => {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    });
}

// 다음/이전/랜덤 곡
function nextSong() { index = (index + 1) % songs.length; play(index); }
function prevSong() { index = (index - 1 + songs.length) % songs.length; play(index); }
function randomSong() { index = Math.floor(Math.random() * songs.length); play(index); }

// 오디오 이벤트
player.addEventListener("ended", nextSong);
player.addEventListener("play", () => { document.getElementById("btnIcon").textContent = "Ⅱ"; });
player.addEventListener("pause", () => { document.getElementById("btnIcon").textContent = "▶"; });
player.ontimeupdate = () => {
    if (player.duration) {
        const cur = player.currentTime;
        const dur = player.duration;
        document.getElementById("curTime").textContent = formatTime(cur);
        document.getElementById("durTime").textContent = formatTime(dur);
        document.getElementById("progFill").style.width = (cur / dur * 100) + "%";
    }
};

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

// 초기 로드 (OLD 카테고리)
loadCategory('old');
</script>
</body>
</html>
